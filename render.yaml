services:
  - type: web
    name: rakesh-premium-bikes
    env: node
    region: singapore
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BASE_URL
        value: https://rakesh-premium-bikes.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: premium-bikes-db
          property: connectionString

databases:
  - name: premium-bikes-db
    region: singapore
    plan: free
